# Salesforce CRM backed entirely by prebuilt DecodingTrust images.

services:
  mariadb:
    image: decodingtrustagent/salesforce-crm:mariadb
    security_opt:
      - seccomp=unconfined
    environment:
      - MYSQL_DATABASE=salesforce_crm
      - MYSQL_USER=sf_user
      - MYSQL_PASSWORD=${SALESFORCE_DATABASE_PASSWORD:?set SALESFORCE_DATABASE_PASSWORD}
      - MYSQL_RANDOM_ROOT_PASSWORD=yes
    volumes:
      - "mariadb_data:/var/lib/mysql"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "sf_user", "-p${SALESFORCE_DATABASE_PASSWORD:?set SALESFORCE_DATABASE_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  salesforce:
    image: decodingtrustagent/salesforce-crm:latest
    security_opt:
      - seccomp=unconfined
    ports:
      - "${SALESFORCE_API_PORT:-8080}:8080"
    environment:
      - SALESFORCE_DATABASE_HOST=mariadb
      - SALESFORCE_DATABASE_PORT_NUMBER=3306
      - SALESFORCE_DATABASE_USER=sf_user
      - SALESFORCE_DATABASE_NAME=salesforce_crm
      - SALESFORCE_DATABASE_PASSWORD=${SALESFORCE_DATABASE_PASSWORD:?set SALESFORCE_DATABASE_PASSWORD}
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -r \"echo @file_get_contents('http://localhost:8080/') ? 'ok' : exit(1);\""]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 15s

volumes:
  mariadb_data:
    driver: local
