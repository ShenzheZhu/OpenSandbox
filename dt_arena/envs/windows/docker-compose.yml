services:
  windows-mcp:
    image: decodingtrustagent/windows
    environment:
      VERSION: '11'
      DISK_FMT: qcow2
      CPU_MODEL: host
      CPU_FLAGS: -invtsc
      HV: N
      ARGUMENTS: -snapshot
      DHCP: N
      VM_NET_DEV: eth0
    devices:
    - /dev/kvm
    - /dev/net/tun
    cap_add:
    - NET_ADMIN
    ports:
    - ${WEB_MANAGEMENT_PORT:-8006}:8006
    - ${RDP_PORT:-3389}:3389/tcp
    - ${RDP_PORT:-3389}:3389/udp
    - ${MCP_SERVICE_PORT:-8005}:8005
    - ${OFFICE_SERVICE_PORT:-8007}:8007
    - ${RESET_PORT:-7101}:7101
    volumes:
    - ${WINDOWS_DATA_DIR:-./windows}:/base:ro
    - ./entry.sh:/run/entry.sh:ro
    - ./reset_server.py:/run/reset_server.py:ro
    - ./dnat_setup.sh:/run/dnat_setup.sh:ro
    restart: always
    stop_grace_period: 2m
  mcp-healthcheck:
    image: curlimages/curl:latest
    depends_on:
    - windows-mcp
    command:
    - sleep
    - infinity
    healthcheck:
      test:
      - CMD
      - curl
      - -sf
      - -X
      - POST
      - http://windows-mcp:8005/tools/powershell
      - -H
      - 'Content-Type: application/json'
      - -d
      - '{"command":"echo 1"}'
      interval: 5s
      timeout: 10s
      retries: 60
      start_period: 30s
      start_interval: 1s
    restart: always
