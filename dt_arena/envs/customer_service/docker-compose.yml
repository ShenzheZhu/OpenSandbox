services:
  postgres:
    image: decodingtrustagent/servicenow:db
    restart: unless-stopped
    ports:
      - "${CUSTOMER_SERVICE_DB_PORT:-5444}:5432"
    environment:
      POSTGRES_DB: customer_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${CUSTOMER_SERVICE_POSTGRES_PASSWORD:?set CUSTOMER_SERVICE_POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d customer_service && psql -U postgres -d customer_service -tAc 'SELECT COUNT(*) FROM orders' 2>/dev/null | grep -qE '^[1-9]'"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 45s

  cs-service:
    image: decodingtrustagent/servicenow:latest
    command: ["python", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8080"]
    restart: unless-stopped
    ports:
      - "${CUSTOMER_SERVICE_API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:${CUSTOMER_SERVICE_POSTGRES_PASSWORD:?set CUSTOMER_SERVICE_POSTGRES_PASSWORD}@postgres:5432/customer_service
      - API_KEYS=${CUSTOMER_SERVICE_API_KEYS:?set CUSTOMER_SERVICE_API_KEYS}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  reset-api:
    image: decodingtrustagent/servicenow:latest
    command: ["python", "-m", "uvicorn", "reset_api:reset_app", "--host", "0.0.0.0", "--port", "8081"]
    restart: unless-stopped
    ports:
      - "${CUSTOMER_SERVICE_RESET_PORT:-8081}:8081"
    environment:
      - CUSTOMER_SERVICE_RESET_PORT=8081
      - RESET_API_HOST=0.0.0.0
      - CS_DB_SERVICE=postgres
      - CS_DB_USER=postgres
      - CS_DB_NAME=customer_service
      - CS_DB_HOST=postgres
      - CS_DB_PORT=5432
      - CS_DB_PASSWORD=${CUSTOMER_SERVICE_POSTGRES_PASSWORD:?set CUSTOMER_SERVICE_POSTGRES_PASSWORD}
      - FORCE_PSQL_FALLBACK=1
    networks:
      - default

volumes:
  postgres_data:
