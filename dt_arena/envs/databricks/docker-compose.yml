version: "3.8"

services:
  databricks-pg:
    image: decodingtrustagent/databricks:latest
    network_mode: host
    security_opt:
      - seccomp=unconfined
    environment:
      POSTGRES_DB: dbxdb
      POSTGRES_USER: dbx
      POSTGRES_PASSWORD: ${DATABRICKS_PG_PASSWORD:?set DATABRICKS_PG_PASSWORD}
      PGPORT: ${DATABRICKS_PG_PORT:-5453}
    volumes:
      - databricks-pg-data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbx -d dbxdb -p ${DATABRICKS_PG_PORT:-5453}"]
      interval: 5s
      timeout: 3s
      retries: 20

  databricks-admin:
    build: ./admin_api
    image: decodingtrustagent/databricks:admin
    network_mode: host
    security_opt:
      - seccomp=unconfined
    depends_on:
      databricks-pg:
        condition: service_healthy
    volumes:
      - ./init:/init-sql:ro
    environment:
      DATABRICKS_PG_HOST: 127.0.0.1
      DATABRICKS_PG_PORT: ${DATABRICKS_PG_PORT:-5453}
      DATABRICKS_PG_DB: dbxdb
      DATABRICKS_PG_USER: dbx
      DATABRICKS_PG_PASSWORD: ${DATABRICKS_PG_PASSWORD:?set DATABRICKS_PG_PASSWORD}
      DATABRICKS_ADMIN_PORT: ${DATABRICKS_ADMIN_PORT:-8453}
      DATABRICKS_INIT_SQL_DIR: /init-sql
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,os; urllib.request.urlopen('http://127.0.0.1:'+os.environ.get('DATABRICKS_ADMIN_PORT','8453')+'/health', timeout=2)\" || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 30
    restart: unless-stopped

volumes:
  databricks-pg-data:
    driver: local
