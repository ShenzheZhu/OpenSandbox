services:
  travel-api:
    image: decodingtrustagent/travel:latest
    ports:
      - "${TRAVEL_PORT:-10300}:10300"
    environment:
      - TRAVEL_HOST=0.0.0.0
      - TRAVEL_PORT=10300
    deploy:
      resources:
        limits:
          memory: 5g
          cpus: '2.0'
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:10300/')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
