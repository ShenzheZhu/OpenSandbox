version: "3.9"
services:
  form-api:
    build:
      context: ./server
      dockerfile: Dockerfile
      network: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    network_mode: host
    restart: unless-stopped
    environment:
      - SCHEMA_PATH=/app/schemas/schema.json
      - ALLOW_ORIGINS=*
      - SCHEMA_INIT=/app/init/schema.json
      - GOOGLE_FORM_API_PORT=${GOOGLE_FORM_API_PORT:-8054}
    volumes:
      - form_data:/app/data  # Named volume - each project gets its own
      - ./schemas:/app/schemas
      - ./init:/app/init

  form-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      network: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    network_mode: host
    restart: unless-stopped
    environment:
      - VITE_API_BASE=/api
      - GOOGLE_FORM_UI_PORT=${GOOGLE_FORM_UI_PORT:-8055}
      - GOOGLE_FORM_API_PORT=${GOOGLE_FORM_API_PORT:-8054}
    depends_on:
      - form-api

volumes:
  form_data:
