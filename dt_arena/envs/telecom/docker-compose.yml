version: "3.9"

services:
  telecom-server:
    build: .
    image: decodingtrustagent/telecom:latest
    environment:
      - TELECOM_HOST=0.0.0.0
      - TELECOM_PORT=17501  # Always use 17501 inside container (matches port mapping)
    ports:
      - "${TELECOM_PORT:-17501}:17501"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:17501/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
