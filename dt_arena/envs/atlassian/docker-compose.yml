services:
  atlassian-pg:
    image: postgres:16
    network_mode: host
    security_opt:
      - seccomp=unconfined
    environment:
      POSTGRES_DB: jira
      POSTGRES_USER: jira
      POSTGRES_PASSWORD: ${ATLASSIAN_DB_PASSWORD:?set ATLASSIAN_DB_PASSWORD}
    command: ["-p", "${ATLASSIAN_DB_PORT:-5454}"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p ${ATLASSIAN_DB_PORT:-5454} -U jira -d jira"]
      interval: 5s
      timeout: 3s
      retries: 30

  atlassian-api:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
      target: production
      network: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    network_mode: host
    depends_on:
      atlassian-pg:
        condition: service_healthy
    volumes:
      - ./app/database/init/01_schema.sql:/app/01_schema.sql:ro
      - ./app/database/init/seed.sql:/app/seed.sql:ro
      - ./app/backend/reset.sh:/reset.sh:ro
    environment:
      NODE_ENV: production
      PORT: ${ATLASSIAN_API_PORT:-8040}
      DB_HOST: 127.0.0.1
      DB_PORT: ${ATLASSIAN_DB_PORT:-5454}
      DB_USER: jira
      DB_PASSWORD: ${ATLASSIAN_DB_PASSWORD:?set ATLASSIAN_DB_PASSWORD}
      DB_NAME: jira
    command: >
      sh -c "until pg_isready -h 127.0.0.1 -p $${DB_PORT} -U $${DB_USER} -d $${DB_NAME}; do sleep 1; done &&
             PGPASSWORD=$${DB_PASSWORD} psql -h 127.0.0.1 -p $${DB_PORT} -U $${DB_USER} -d $${DB_NAME} -f /app/01_schema.sql &&
             PGPASSWORD=$${DB_PASSWORD} psql -h 127.0.0.1 -p $${DB_PORT} -U $${DB_USER} -d $${DB_NAME} -f /app/seed.sql &&
             npm start"
    healthcheck:
      # Use Node's built-in fetch to avoid requiring curl in the image.
      test: ["CMD", "node", "-e", "fetch('http://localhost:' + process.env.PORT + '/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  atlassian-ui:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
      target: production
      network: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    network_mode: host
    depends_on:
      - atlassian-api
    environment:
      VITE_API_URL: http://127.0.0.1:${ATLASSIAN_API_PORT:-8040}/api
      NGINX_PORT: ${ATLASSIAN_UI_PORT:-8041}
      BACKEND_PORT: ${ATLASSIAN_API_PORT:-8040}

 