version: "3.8"
services:
  telegram-pg:
    build:
      context: .
      dockerfile: Dockerfile.pg
    network_mode: host
    privileged: true
    security_opt:
      - seccomp:unconfined
    environment:
      POSTGRES_DB: telegram_sandbox
      POSTGRES_USER: sandbox
      POSTGRES_PASSWORD: ${TELEGRAM_PG_PASSWORD:?set TELEGRAM_PG_PASSWORD}
      PGPORT: ${TELEGRAM_PG_PORT:-5472}
    volumes:
      - telegram-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sandbox -d telegram_sandbox"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  telegram-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    network_mode: host
    privileged: true
    security_opt:
      - seccomp:unconfined
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      telegram-pg:
        condition: service_healthy
    environment:
      TELEGRAM_PG_HOST: 127.0.0.1
      TELEGRAM_PG_PORT: ${TELEGRAM_PG_PORT:-5472}
      TELEGRAM_PG_DB: telegram_sandbox
      TELEGRAM_PG_USER: sandbox
      TELEGRAM_PG_PASSWORD: ${TELEGRAM_PG_PASSWORD:?set TELEGRAM_PG_PASSWORD}
      TELEGRAM_API_PORT: ${TELEGRAM_API_PORT:-8038}
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "${TELEGRAM_API_PORT:-8038}"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:$${TELEGRAM_API_PORT:-8038}/health', timeout=5)\" || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 90s
    restart: unless-stopped

volumes:
  telegram-pgdata:
