services:
  calendar-api:
    build:
      context: ./calendar_api
      dockerfile: Dockerfile
      network: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    network_mode: host
    volumes:
      - calendar_data:/app/data  # Named volume - each project gets its own
      - gmail_data:/data  # Named volume for Gmail auth data
    environment:
      - DATABASE_URL=sqlite:////app/data/calendar.db
      - MAILPIT_SMTP_HOST=127.0.0.1
      - MAILPIT_SMTP_PORT=${GMAIL_SMTP_PORT:-1025}
      - CALENDAR_API_PORT=${CALENDAR_API_PORT:-8032}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${CALENDAR_API_PORT:-8032}/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  calendar-ui:
    build:
      context: ./calendar_ui
      dockerfile: Dockerfile
      network: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    network_mode: host
    depends_on:
      - calendar-api
    environment:
      - REACT_APP_API_URL=http://localhost:${CALENDAR_API_PORT:-8032}
      - CALENDAR_UI_PORT=${CALENDAR_UI_PORT:-8026}

volumes:
  calendar_data:
  gmail_data:
