version: "3.8"
services:
  whatsapp-pg:
    image: postgres:14
    network_mode: host
    privileged: true
    security_opt:
      - seccomp:unconfined
    environment:
      POSTGRES_DB: whatsapp_sandbox
      POSTGRES_USER: sandbox
      POSTGRES_PASSWORD: ${WHATSAPP_PG_PASSWORD:?set WHATSAPP_PG_PASSWORD}
      PGPORT: ${WHATSAPP_PG_PORT:-5473}
    volumes:
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sandbox -d whatsapp_sandbox"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  whatsapp-api:
    image: python:3.12-slim
    network_mode: host
    privileged: true
    security_opt:
      - seccomp:unconfined
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      whatsapp-pg:
        condition: service_healthy
    working_dir: /app
    environment:
      WHATSAPP_PG_HOST: 127.0.0.1
      WHATSAPP_PG_PORT: ${WHATSAPP_PG_PORT:-5473}
      WHATSAPP_PG_DB: whatsapp_sandbox
      WHATSAPP_PG_USER: sandbox
      WHATSAPP_PG_PASSWORD: ${WHATSAPP_PG_PASSWORD:?set WHATSAPP_PG_PASSWORD}
      WHATSAPP_API_PORT: ${WHATSAPP_API_PORT:-8039}
    volumes:
      - ./api:/app:ro
      - ./init_examples:/init_examples:ro
    command: >
      sh -c "pip install --no-cache-dir --progress-bar off 'psycopg[binary]>=3.1' fastapi 'uvicorn[standard]' &&
             uvicorn main:app --host 0.0.0.0 --port $${WHATSAPP_API_PORT:-8039}"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:$${WHATSAPP_API_PORT:-8039}/health', timeout=5)\" || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 90s
    restart: unless-stopped

  whatsapp-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      network: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    network_mode: host
    restart: unless-stopped
    depends_on:
      whatsapp-api:
        condition: service_healthy
    environment:
      WHATSAPP_FRONTEND_PORT: ${WHATSAPP_FRONTEND_PORT:-8040}
      WHATSAPP_API_URL: http://127.0.0.1:${WHATSAPP_API_PORT:-8039}
