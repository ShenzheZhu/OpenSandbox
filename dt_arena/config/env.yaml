default_max_instances: null
environments:
  customer_service:
    docker_compose: dt_arena/envs/customer_service/docker-compose.yml
    max_instances: 10
    reset_endpoints:
      api:
        url: http://127.0.0.1:${CUSTOMER_SERVICE_RESET_PORT}/reset
        method: POST
    ports:
      CUSTOMER_SERVICE_DB_PORT:
        default: 5444
        container_port: 5432
      CUSTOMER_SERVICE_API_PORT:
        default: 8080
        container_port: 8080
      CUSTOMER_SERVICE_RESET_PORT:
        default: 8081
        container_port: 8081
    profile: business
  gmail:
    docker_compose: dt_arena/envs/gmail/docker-compose-hub.yml
    reset_endpoints:
      auth:
        url: http://127.0.0.1:${GMAIL_AUTH_PORT}/api/v1/reset
        method: POST
    ports:
      GMAIL_SMTP_PORT:
        default: 1025
        container_port: 1025
      GMAIL_AUTH_PORT:
        default: 8030
        container_port: 8030
      GMAIL_PROXY_PORT:
        default: 8031
        container_port: 8031
      GMAIL_UI_PORT:
        default: 8025
        container_port: 8025
      GMAIL_FRONTEND_PORT:
        default: 8050
        container_port: 80
    profile: collaboration
  slack:
